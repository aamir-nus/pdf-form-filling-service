<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Form Filler</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <h1>PDF Form Filler</h1>
      <div class="toolbar">
        <label class="btn">Open PDF<input type="file" id="file" accept="application/pdf" hidden /></label>
        <button id="add-text" disabled>Add text</button>
        <label class="btn">Add image<input type="file" id="img" accept="image/*" hidden disabled /></label>
        <button id="download" disabled>Download filled PDF</button>
      </div>
      <p class="hint">Tip: drag &amp; drop an image onto any page. Click a page to make it active before adding text/images.</p>
    </header>
    <main id="pages"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
